name: Pick runner

# Reusable workflow that decides where to land downstream jobs based on:
#   1. PC self-hosted runner availability (pc-cpu label) — preferred for ALL weights when online
#   2. The job's weight (light vs heavy) — when PC is offline
#
# Fallback when PC is offline:
#   - weight=light → ubuntu-latest (uses GH free tier first; cheap per-minute if over)
#   - weight=heavy → MIG (mroot-self-hosted; ~$0.01/job amortized), then ubuntu-latest if MIG also offline
#
# Final fallback when EVERYTHING self-hosted is offline: ubuntu-latest.
#
# *** HIPAA-FUTURE-NOTE — when the first BAA client signs, restore the hard gate. ***
# Repos listed in scripts/gates/hipaa-repos.txt must NEVER use this workflow because
# the fallback chain routes to PC or ubuntu-latest (both BAA-prohibited). The HIPAA
# gate is currently SUSPENDED (2026-06-21) because there are no BAA clients yet and
# the demo site `ait-hosted-agents` was paying the HIPAA-floor cost prematurely.
# Restore the gate by repopulating scripts/gates/hipaa-repos.txt + restoring the
# size=1 MIG floor in Cloud Scheduler `runner-mig-scale-down-ig-org`.
#
# Consumer pattern (non-HIPAA):
#
#   jobs:
#     pick:
#       uses: intelligent-group/.github/.github/workflows/_pick-runner.yml@main
#       with:
#         weight: heavy   # "light" for lint/typecheck/format; "heavy" for build/test/e2e. Default: heavy (safer).
#     build:
#       needs: pick
#       runs-on: ${{ fromJSON(needs.pick.outputs.runs_on) }}
#       steps:
#         - uses: actions/checkout@v4
#         - run: pnpm install && pnpm test
#
# Costs ~5s of ubuntu-latest per consuming workflow run (the pick job itself).

on:
  workflow_call:
    inputs:
      weight:
        description: "Job weight: 'light' (lint/typecheck/format/security-scan; <2min, low CPU) or 'heavy' (build/test/e2e/docker; 5-30min, high CPU). Default 'heavy' (safer fallback to MIG)."
        required: false
        type: string
        default: heavy
    outputs:
      runs_on:
        description: "JSON array of labels to feed runs-on"
        value: ${{ jobs.pick.outputs.runs_on }}
      picked:
        description: "Human-readable tier picked: 'pc-cpu', 'mroot-self-hosted', or 'ubuntu-latest'"
        value: ${{ jobs.pick.outputs.picked }}

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runs_on: ${{ steps.decide.outputs.runs_on }}
      picked:  ${{ steps.decide.outputs.picked }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEIGHT:   ${{ inputs.weight }}
        shell: bash
        run: |
          set -euo pipefail
          WEIGHT="${WEIGHT:-heavy}"
          if [ "$WEIGHT" != "light" ] && [ "$WEIGHT" != "heavy" ]; then
            echo "::warning::invalid weight '$WEIGHT'; defaulting to 'heavy'"
            WEIGHT=heavy
          fi
          echo "weight=$WEIGHT"

          # Helper: query org-level runners (works with default read token; repo-level
          # runners API requires actions:write which reusable workflow callers don't grant).
          # On 403/4xx the API returns error JSON; filter it with select(.status==...) so
          # non-runner JSON objects (error payloads) are silently ignored.
          ORG="${{ github.repository_owner }}"

          # ----- Tier 1: PC self-hosted (always preferred when online+idle) -----
          PICK_PC=$(gh api "orgs/${ORG}/actions/runners" \
            --paginate \
            --jq '.runners[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("pc-cpu"))) | .name' \
            2>/dev/null | head -1 || true)
          if [ -n "$PICK_PC" ]; then
            echo "::notice::Picked Tier-1 PC runner: $PICK_PC (weight=$WEIGHT)"
            echo 'runs_on=["self-hosted","pc-cpu"]' >> "$GITHUB_OUTPUT"
            echo 'picked=pc-cpu' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ----- PC offline: branch by weight -----
          if [ "$WEIGHT" = "light" ]; then
            # Light tasks → ubuntu-latest first (GH free tier 3000min/mo on private repos)
            echo "::notice::PC offline + weight=light; routing to ubuntu-latest (cheap)"
            echo 'runs_on=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo 'picked=ubuntu-latest' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # weight=heavy: try MIG (cheaper per-job for sustained load), else ubuntu-latest
          PICK_MIG=$(gh api "orgs/${ORG}/actions/runners" \
            --paginate \
            --jq '.runners[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("mroot-self-hosted"))) | .name' \
            2>/dev/null | head -1 || true)
          if [ -n "$PICK_MIG" ]; then
            echo "::notice::PC offline + weight=heavy; picked Tier-2 MIG: $PICK_MIG"
            echo 'runs_on=["self-hosted","mroot-self-hosted"]' >> "$GITHUB_OUTPUT"
            echo 'picked=mroot-self-hosted' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::PC offline + MIG offline; final fallback to ubuntu-latest"
          echo 'runs_on=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          echo 'picked=ubuntu-latest' >> "$GITHUB_OUTPUT"
