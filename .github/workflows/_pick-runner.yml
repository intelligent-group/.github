name: Pick runner

# Reusable workflow that decides where to land downstream jobs based on
# runner availability. Decision order (additive — if upper tier is offline,
# fall back to existing setup):
#
#   1. PC self-hosted runner (label: pc-cpu)         — preferred when online + idle
#   2. MIG self-hosted runner (label: mroot-self-hosted) — existing intelligent-group-ait MIG (10x e2-standard-2 preemptible)
#   3. ubuntu-latest                                 — GH-hosted fallback when everything else is offline
#
# How to consume from any intelligent-group org repo:
#
#   jobs:
#     pick:
#       uses: intelligent-group/.github/.github/workflows/_pick-runner.yml@main
#     build:
#       needs: pick
#       runs-on: ${{ fromJSON(needs.pick.outputs.runs_on) }}
#       steps:
#         - uses: actions/checkout@v4
#         - run: pnpm install && pnpm test
#
# Costs ~5s of ubuntu-latest per consuming workflow run (the pick job itself).

on:
  workflow_call:
    outputs:
      runs_on:
        description: "JSON array of labels to feed runs-on"
        value: ${{ jobs.pick.outputs.runs_on }}
      picked:
        description: "Human-readable tier: 'pc-cpu', 'mroot-self-hosted', or 'ubuntu-latest'"
        value: ${{ jobs.pick.outputs.picked }}

permissions:
  actions: read

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runs_on: ${{ steps.decide.outputs.runs_on }}
      picked:  ${{ steps.decide.outputs.picked }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          # Tier 1: PC self-hosted (label pc-cpu)
          PICK_PC=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("pc-cpu"))) | .name' \
            | head -1 || true)
          if [ -n "$PICK_PC" ]; then
            echo "::notice::Picked Tier-1 PC runner: $PICK_PC"
            echo 'runs_on=["self-hosted","pc-cpu"]' >> "$GITHUB_OUTPUT"
            echo 'picked=pc-cpu' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Tier 2: MIG self-hosted (label mroot-self-hosted) — existing intelligent-group-ait MIG fleet
          PICK_MIG=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("mroot-self-hosted"))) | .name' \
            | head -1 || true)
          if [ -n "$PICK_MIG" ]; then
            echo "::notice::Picked Tier-2 MIG runner: $PICK_MIG"
            echo 'runs_on=["self-hosted","mroot-self-hosted"]' >> "$GITHUB_OUTPUT"
            echo 'picked=mroot-self-hosted' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Tier 3: ubuntu-latest (GH-hosted)
          echo "::notice::No self-hosted runners online+idle; falling back to ubuntu-latest"
          echo 'runs_on=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          echo 'picked=ubuntu-latest' >> "$GITHUB_OUTPUT"
