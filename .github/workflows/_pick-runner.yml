name: Pick runner

# Reusable workflow that decides where to land downstream jobs based on:
#   1. PC self-hosted runner availability (pc-cpu label) — preferred for ALL weights when online
#   2. The job's weight (light vs heavy) — when PC is offline
#
# Fallback when PC is offline:
#   - weight=light → ubuntu-latest (uses GH free tier first; cheap per-minute if over)
#   - weight=heavy → MIG (ig-self-hosted; ~$0.01/job amortized), then ubuntu-latest if MIG also offline
#
# Final fallback when EVERYTHING self-hosted is offline: ubuntu-latest.
#
# *** HIPAA-FUTURE-NOTE — when the first BAA client signs, restore the hard gate. ***
# Repos listed in scripts/gates/hipaa-repos.txt must NEVER use this workflow because
# the fallback chain routes to PC or ubuntu-latest (both BAA-prohibited). The HIPAA
# gate is currently SUSPENDED (2026-06-21) because there are no BAA clients yet and
# the demo site `ait-hosted-agents` was paying the HIPAA-floor cost prematurely.
# Restore the gate by repopulating scripts/gates/hipaa-repos.txt + restoring the
# size=1 MIG floor in Cloud Scheduler `runner-mig-scale-down-ig-org`.
#
# Root cause (2026-06-21): GITHUB_TOKEN in reusable workflows cannot query
# /orgs/{org}/actions/runners — the endpoint requires `administration:read`
# which is NOT in the GITHUB_TOKEN permission set. Even with `permissions: actions: read`
# on the consumer, the reusable receives a heavily-restricted integration token (403
# on GET /user).
#
# AUTH HIERARCHY (preferred → fallback):
#   1. GitHub App installation token (zero-rotation) — activated when org secrets
#      APP_ID + APP_PRIVATE_KEY are set AND the caller uses `secrets: inherit`.
#      Required App permission: organization_self_hosted_runners (read).
#      Minted fresh per-run via actions/create-github-app-token@v3.
#   2. RUNNER_QUERY_PAT (static PAT) — legacy fallback while App is not wired.
#      GSM canonical name: github__mroot2025__runner-query-pat (project: intelligent-group-ait).
#   3. GITHUB_TOKEN — structural fallback; always produces empty runner list
#      (administration:read not in scope), so all jobs land on ubuntu-latest.
#
# Consumer pattern (preferred — passes all org secrets including APP_ID/APP_PRIVATE_KEY):
#
#   jobs:
#     pick:
#       uses: intelligent-group/.github/.github/workflows/_pick-runner.yml@main
#       with:
#         weight: heavy   # "light" for lint/typecheck/format; "heavy" for build/test/e2e.
#       secrets: inherit  # passes APP_ID + APP_PRIVATE_KEY + RUNNER_QUERY_PAT
#     build:
#       needs: pick
#       runs-on: ${{ fromJSON(needs.pick.outputs.runs_on) }}
#       steps:
#         # REQUIRED first step whenever runs_on can resolve to a self-hosted
#         # label ("pc-cpu" / "ig-self-hosted"): those runners are persistent
#         # boxes, and a stale git http.extraheader left by a prior interrupted
#         # job collides with the one actions/checkout injects here, producing
#         # `remote: Duplicate header: "Authorization"` (HTTP 400) at checkout.
#         # No-op on a clean box and on ubuntu-latest fallback — safe always-on.
#         - uses: intelligent-group/.github/actions/purge-stale-git-auth@main
#         - uses: actions/checkout@v4
#         - run: pnpm install && pnpm test
#
# Legacy consumer pattern (PAT only — still works, App token not activated):
#
#   secrets:
#     runner_query_pat: ${{ secrets.RUNNER_QUERY_PAT }}
#
# Costs ~5s of ubuntu-latest per consuming workflow run (the pick job itself).

on:
  workflow_call:
    inputs:
      weight:
        description: "Job weight: 'light' (lint/typecheck/format/security-scan; <2min, low CPU) or 'heavy' (build/test/e2e/docker; 5-30min, high CPU). Default 'heavy' (safer fallback to MIG)."
        required: false
        type: string
        default: heavy
    secrets:
      runner_query_pat:
        description: "PAT with administration:read on this org (legacy fallback). Still works when APP_ID is not configured. Store as org/repo secret RUNNER_QUERY_PAT."
        required: false
      app_id:
        description: "GitHub App ID (integer) for intelligent-group-ait-bot. When set together with app_private_key, a short-lived installation token is minted instead of using the static RUNNER_QUERY_PAT. Activate by adding APP_ID as an org secret and using `secrets: inherit` in callers."
        required: false
      app_private_key:
        description: "GitHub App private key PEM for app_id. Store as org secret APP_PRIVATE_KEY."
        required: false
    outputs:
      runs_on:
        description: "JSON array of labels to feed runs-on"
        value: ${{ jobs.pick.outputs.runs_on }}
      picked:
        description: "Human-readable tier picked: 'pc-cpu', 'ig-self-hosted', or 'ubuntu-latest'"
        value: ${{ jobs.pick.outputs.picked }}

# NOTE: do NOT add workflow-level permissions: block here. Prior bisect proved
# that workflow-level permissions: causes startup_failure in this org's GHA config.
# Root cause is deeper: GITHUB_TOKEN structurally cannot call the runners API.
# Solution: App installation token (preferred) or PAT (legacy) — see AUTH HIERARCHY above.

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runs_on: ${{ steps.decide.outputs.runs_on }}
      picked:  ${{ steps.decide.outputs.picked }}
    steps:
      # ---------------------------------------------------------------------------
      # Mint a short-lived GitHub App installation token (zero-rotation path).
      # Only runs when APP_ID + APP_PRIVATE_KEY are available (org secrets passed
      # via `secrets: inherit` in the calling workflow).
      # Required App permission: organization_self_hosted_runners (read).
      # When skipped, decide step falls back to runner_query_pat (legacy PAT).
      # ---------------------------------------------------------------------------
      - id: mint-runner-token
        name: Mint GitHub App runner-query token
        # `secrets` context is NOT allowed in step `if:` conditions (GHA + actionlint).
        # Use continue-on-error instead: the step fails softly when APP_ID is not set
        # (create-github-app-token requires a valid app-id), and the three-tier token
        # fallback in the `decide` step picks up runner_query_pat or GITHUB_TOKEN.
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - id: decide
        env:
          # Token priority: App installation token → legacy PAT → GITHUB_TOKEN (403 fallback).
          # App token is used when APP_ID + APP_PRIVATE_KEY are set (zero-rotation).
          # RUNNER_QUERY_PAT remains fully functional as fallback during migration.
          GH_TOKEN: ${{ steps.mint-runner-token.outputs.token || secrets.runner_query_pat || secrets.GITHUB_TOKEN }}
          WEIGHT:   ${{ inputs.weight }}
        shell: bash
        run: |
          set -euo pipefail
          WEIGHT="${WEIGHT:-heavy}"
          if [ "$WEIGHT" != "light" ] && [ "$WEIGHT" != "heavy" ]; then
            echo "::warning::invalid weight '$WEIGHT'; defaulting to 'heavy'"
            WEIGHT=heavy
          fi
          echo "weight=$WEIGHT"

          # Helper: query runners. Requires a PAT with administration:read.
          # GITHUB_TOKEN cannot query this endpoint (returns 403 or empty list).
          # Primary: org-level runners (visible to all org repos).
          # Secondary: repo-level runners (repo-registered runners only visible here).
          # Results are merged and deduplicated by runner ID before selection.
          ORG="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"

          runners_json() {
            local org_runners repo_runners
            # Harden: || only fires on non-zero exit; empty stdout still leaves var empty.
            # Explicit empty-check ensures fallback JSON even on silent 204/empty responses.
            org_runners=$(gh api "orgs/${ORG}/actions/runners?per_page=100" 2>/dev/null)
            [ -z "$org_runners" ] && org_runners='{"runners":[]}'
            repo_runners=$(gh api "repos/${REPO}/actions/runners?per_page=100" 2>/dev/null)
            [ -z "$repo_runners" ] && repo_runners='{"runners":[]}'
            # Merge + dedupe by runner .id; org runners take precedence.
            # Null-safe: // {} and // [] guard against either API returning non-JSON.
            printf '%s\n%s' "$org_runners" "$repo_runners" \
              | jq -s '[ ((.[0] // {}).runners // [])[], ((.[1] // {}).runners // [])[] ] | unique_by(.id)'
          }

          # ----- Tier 1: PC self-hosted (always preferred when online+idle) -----
          PICK_PC=$(runners_json | \
            jq -r '.[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("pc-cpu"))) | .name' \
            | head -1)
          if [ -n "$PICK_PC" ]; then
            echo "::notice::Picked Tier-1 PC runner: $PICK_PC (weight=$WEIGHT)"
            echo 'runs_on=["self-hosted","pc-cpu"]' >> "$GITHUB_OUTPUT"
            echo 'picked=pc-cpu' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ----- PC offline: branch by weight -----
          if [ "$WEIGHT" = "light" ]; then
            # Light tasks → ubuntu-latest first (GH free tier 3000min/mo on private repos)
            echo "::notice::PC offline + weight=light; routing to ubuntu-latest (cheap)"
            echo 'runs_on=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo 'picked=ubuntu-latest' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # weight=heavy: try MIG (cheaper per-job for sustained load), else ubuntu-latest
          PICK_MIG=$(runners_json | \
            jq -r '.[]? | select((.status=="online") and (.busy==false) and ([.labels[].name] | index("ig-self-hosted"))) | .name' \
            | head -1)
          if [ -n "$PICK_MIG" ]; then
            echo "::notice::PC offline + weight=heavy; picked Tier-2 MIG: $PICK_MIG"
            echo 'runs_on=["self-hosted","ig-self-hosted"]' >> "$GITHUB_OUTPUT"
            echo 'picked=ig-self-hosted' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::PC offline + MIG offline; final fallback to ubuntu-latest"
          echo 'runs_on=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          echo 'picked=ubuntu-latest' >> "$GITHUB_OUTPUT"
