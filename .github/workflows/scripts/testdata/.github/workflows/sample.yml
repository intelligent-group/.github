name: sample
on: [push]
jobs:
  deploy:                # hang-class: project npm ci, non-browser, no skip-env -> FAIL
    runs-on: ubuntu-latest
    steps:
      - run: npm ci
      - run: vercel build
  deploy-fixed:          # project npm ci but skip-env present -> not flagged
    runs-on: ubuntu-latest
    steps:
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: vercel build
  e2e:                   # browser job with a job timeout -> not flagged
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - run: npm ci
      - run: npx playwright test
  tools:                 # global install -> not a project install -> not flagged
    runs-on: ubuntu-latest
    steps:
      - run: npm install -g vercel@latest
  probe:                 # hang-class: named-pkg install on fresh checkout reconciles
    runs-on: ubuntu-latest   # the root tree -> runs playwright postinstall, non-browser,
    steps:                   # no skip-env -> FAIL (lesson point 5)
      - run: npm install --no-save tsx
      - run: npx tsx scripts/probe.ts
