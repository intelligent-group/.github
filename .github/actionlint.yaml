# Canonical actionlint configuration for intelligent-group/* repos.
# Source of truth: intelligent-group/.github/.github/actionlint.yaml
# https://github.com/rhysd/actionlint/blob/main/docs/config.md
#
# actionlint has no org-level config inheritance -- every consuming repo
# needs its own copy of this file at .github/actionlint.yaml. This copy was
# synced from the canonical source above (fleet actionlint normalization,
# 2026-07-08). If you need to add a label, add it there first, then re-sync.
#
# Label provenance (why each label is here -- do not prune without checking
# `grep -rn "runs-on" .github/workflows/` fleet-wide first; unused-but-listed
# labels are harmless, a used-but-missing label breaks the lint job):
self-hosted-runner:
  labels:
    # --- actively used in runs-on: today (verified 2026-07-08 fleet scan) ---
    - ig-self-hosted       # MIG (GPU-enabled cloud runner, ~$0.01/job amortized)
    - pc-cpu               # on-premises PC runner pool (preferred when online)
    - pc-ultra7-268v       # named PC box, used directly in ait-mailroom/runner-smoke.yml
    # --- legacy / reserved labels, not currently used in any runs-on: literal,
    #     kept for compatibility with ad-hoc extra_labels fan-outs
    #     (runner-cli-bootstrap.yml, runner-hygiene.yml) that can target these
    #     pool names dynamically. Safe to keep: an unused allowlist entry never
    #     fails the lint; only a used-but-missing one does. ---
    - mroot-self-hosted
    - mroot-self-hosted-small
    - ig-self-hosted-small
    - ig-self-hosted-priority
    - pc-ultra7-mruser
    - pc-ultra7-igorg
    - priority
    - org-wide
    - ig-org
    - ig-org-runner
    - mr-user
